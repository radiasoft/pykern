---
default:
  tag:
    # Google Analytics / Tag Manager
    'script.*src=.*google-analytics\.com': delete
    'script.*src=.*googletagmanager\.com': delete
    'script.*src=.*gtag\.js': delete
    'script.*GoogleAnalyticsObject': delete
    'script.*gtag\s*\(': delete
    'script.*_gaq\s*\.': delete
    # Other analytics/beacons
    'script.*src=.*hotjar\.com': delete
    'script.*hotjar': delete
    'script.*src=.*clarity\.ms': delete
    'script.*clarity\(': delete
    'script.*src=.*amplitude\.com': delete
    # GTM noscript fallback
    'noscript.*googletagmanager': delete
    # WordPress infrastructure links
    'link.*type=application/json\+oembed': delete
    'link.*type=text/xml\+oembed': delete
    'link.*type=application/rsd\+xml': delete
    'link.*https://api\.w\.org/': delete
    'link.*rel=EditURI': delete
